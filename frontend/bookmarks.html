<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Đã Lưu - RIPT Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/chatbot.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <main class="main-container">
        <div class="section-header">
            <h2><i class="bi bi-bookmark-heart-fill"></i> Phòng Đã Lưu</h2>
            <p class="text-muted">Danh sách các phòng trọ bạn đã đánh dấu yêu thích</p>
        </div>

        <div id="bookmarks-content">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Đang tải...</span>
                </div>
            </div>
        </div>

        <div id="room-grid" class="room-grid"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/storage.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/apiClient.js"></script>
    <script src="js/services/authApi.js"></script>
    <script src="js/services/roomApi.js"></script>
    <script src="js/features/auth.js"></script>
    <script src="js/features/chat.js"></script>
    <script src="js/features/rooms.js"></script>
    <script src="js/pages/bookmarks.js"></script>
    <script src="js/components/header-loader.js"></script>
    <script src="js/components/footer-loader.js"></script>
    <script src="js/components/chatbot-loader.js"></script>
</body>

</html>
