<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản trị Cao cấp - ThuêPhong SV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="container py-4">
    <h1 class="mb-4">🚀 Hệ Thống Quản Lý Chủ Nhà</h1>

    <div class="dashboard-grid">
        <div class="card shadow-sm">
            <h3>💰 Tổng Doanh Thu Thực Tế</h3>
            <div id="total-revenue" class="stat-val">0đ</div>
        </div>
        <div class="card shadow-sm">
            <h3>🎟️ Tạo Mã Giảm Giá Mới</h3>
            <div class="coupon-box row g-2">
                <div class="col-12 col-md">
                    <input type="text" id="cp-code" class="form-control" placeholder="Mã (VD: DIS500)">
                </div>
                <div class="col-12 col-md">
                    <input type="number" id="cp-val" class="form-control" placeholder="Số tiền giảm">
                </div>
                <div class="col-12 col-md-auto">
                    <button class="btn btn-primary w-100" onclick="addCoupon()">Thêm</button>
                </div>
            </div>
            <div id="coupon-list" class="coupon-list"></div>
        </div>
    </div>

    <div class="order-section">
        <h3>📄 Danh Sách Khách Đặt Phòng</h3>
        <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Ngày đặt</th>
                    <th>Khách hàng</th>
                    <th>Tên phòng (Sản phẩm)</th>
                    <th>Giá thanh toán</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody id="order-table-body">
                </tbody>
        </table>
        </div>
    </div>
    
    <button onclick="clearOrders()" class="btn btn-outline-danger btn-sm">🗑️ Xóa lịch sử đơn hàng</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/apiClient.js"></script>
<script src="js/services/couponApi.js"></script>
<script src="js/services/orderApi.js"></script>
<script src="js/services/adminApi.js"></script>
<script src="js/features/coupons.js"></script>
<script src="js/pages/admin.js"></script>
</body>
</html>
