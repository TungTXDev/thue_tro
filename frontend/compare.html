<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So Sánh Phòng Trọ - RIPT Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/compare.css">
    <link rel="stylesheet" href="css/chatbot.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <div class="container compare-container">
        <div class="compare-header">
            <h1><i class="bi bi-arrow-left-right"></i> So Sánh Phòng Trọ</h1>
            <p>Chọn 2 phòng để so sánh chi tiết và tìm ra lựa chọn phù hợp nhất</p>
        </div>

        <div class="compare-grid">
            <!-- Room 1 -->
            <div class="compare-column">
                <div id="room1-placeholder" class="room-placeholder">
                    <div class="placeholder-icon">
                        <i class="bi bi-plus-circle"></i>
                    </div>
                    <button class="btn btn-primary" onclick="openRoomSelector(1)">
                        Add Room
                    </button>
                </div>
                <div id="room1-content" class="room-content" style="display: none;">
                    <!-- Room 1 details will be loaded here -->
                </div>
            </div>

            <!-- Room 2 -->
            <div class="compare-column">
                <div id="room2-placeholder" class="room-placeholder">
                    <div class="placeholder-icon">
                        <i class="bi bi-plus-circle"></i>
                    </div>
                    <button class="btn btn-primary" onclick="openRoomSelector(2)">
                        Add Room
                    </button>
                </div>
                <div id="room2-content" class="room-content" style="display: none;">
                    <!-- Room 2 details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Room Selector Modal -->
    <div id="room-selector-modal" class="modal-overlay">
        <div class="modal-content-wrapper">
            <div class="modal-header">
                <h3>Chọn phòng để so sánh</h3>
                <button class="modal-close" onclick="closeRoomSelector()">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="modal-search">
                <input type="text" id="modal-search-input" class="form-control" placeholder="Tìm kiếm phòng..."
                    onkeyup="filterModalRooms()">
            </div>
            <div id="room-list" class="room-list">
                <!-- Room list will be loaded here -->
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/storage.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/apiClient.js"></script>
    <script src="js/services/authApi.js"></script>
    <script src="js/services/roomApi.js"></script>
    <script src="js/features/auth.js"></script>
    <script src="js/features/chat.js"></script>
    <script src="js/pages/compare.js"></script>
    <script src="js/components/header-loader.js"></script>
    <script src="js/components/footer-loader.js"></script>
    <script src="js/components/chatbot-loader.js"></script>
</body>

</html>
