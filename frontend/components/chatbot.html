<!-- AI Chatbot Component -->
<div id="ai-chat-box" class="chat-box">
    <div class="chat-header">
        <div class="chat-header-left">
            <div class="chat-bot-avatar">
                <i class="bi bi-robot"></i>
            </div>
            <div class="chat-header-info">
                <span class="chat-title">holaBot</span>
                <span class="chat-status"><i class="bi bi-circle-fill"></i> Online</span>
            </div>
        </div>
        <div class="chat-header-actions">
            <button onclick="clearChat()" class="chat-action-btn" title="Xóa lịch sử">
                <i class="bi bi-trash3"></i>
            </button>
            <button onclick="toggleAIChat()" class="chat-action-btn" title="Đóng">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>
    <div id="chat-content" class="chat-content">
        <div class="chat-message bot-message">
            <div class="message-avatar">
                <i class="bi bi-robot"></i>
            </div>
            <div class="message-text">
                <p><strong>Xin chào! Tôi là holaBot - trợ lý AI của RIPT Rental 🏠✨</strong></p>
                <p>Tôi có thể giúp bạn:</p>
                <ul>
                    <li>🔍 Tìm kiếm nhà trọ theo địa điểm</li>
                    <li>💰 Tư vấn về giá cả và tiện nghi</li>
                    <li>📍 Gợi ý khu vực phù hợp</li>
                    <li>❓ Giải đáp thắc mắc về dịch vụ</li>
                </ul>
                <p>Bạn đang tìm kiếm gì hôm nay?</p>
            </div>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" class="chat-input" placeholder="Nhập tin nhắn..."
            onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()" class="chat-send-btn">
            <i class="bi bi-send-fill"></i>
        </button>
    </div>
</div>

<!-- Floating Chat Button -->
<button id="chat-float-btn" class="chat-float-btn" onclick="toggleAIChat()" title="Chat với AI">
    <i class="bi bi-chat-dots-fill"></i>
    <span class="chat-badge">AI</span>
</button>
