<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Thuê Phòng & Căn Hộ Cho Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/chatbot.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <section class="hero">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="video/videodemo.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2>Tìm chỗ ở phù hợp cho sinh viên</h2>
            <p>Hơn +1000 phòng trọ, căn hộ dịch vụ giá rẻ, an ninh, tiện nghi đang chờ bạn.</p>
            <a href="#room-grid" class="btn btn-warning"><i class="bi bi-search"></i> Xem phòng mới nhất</a>
        </div>
    </section>

    <main class="main-container">
        <div class="section-header">
            <h2><i class="bi bi-house-door"></i> Phòng mới và nổi bật</h2>
        </div>

        <div class="filter-bar row g-3 align-items-center">
            <div class="col-12 col-lg">
                <div class="search-autocomplete-wrapper">
                    <input type="text" id="search" class="form-control" placeholder="Nhập tên phòng hoặc khu vực..."
                        autocomplete="off" onkeyup="handleSearchInput(event)" onfocus="showSuggestions()"
                        onblur="hideSuggestions()">
                    <div id="search-suggestions" class="search-suggestions"></div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <select id="priceRange" class="form-select">
                    <option value="all">Khoảng giá (VNĐ)</option>
                    <option value="under2">Dưới 2.000.000</option>
                    <option value="2to3">2.000.000 - 3.000.000</option>
                    <option value="above3">Trên 3.000.000</option>
                </select>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <select id="type" class="form-select">
                    <option value="all">Loại phòng</option>
                    <option value="Trọ">Phòng trọ</option>
                    <option value="Căn hộ">Căn hộ dịch vụ</option>
                </select>
            </div>
        </div>

        <div id="room-grid" class="room-grid"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/storage.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/apiClient.js"></script>
    <script src="js/services/authApi.js"></script>
    <script src="js/services/roomApi.js"></script>
    <script src="js/data/rooms.js"></script>
    <script src="js/features/chat.js"></script>
    <script src="js/features/auth.js"></script>
    <script src="js/features/rooms.js"></script>
    <script src="js/pages/index.js"></script>
    <script src="js/components/header-loader.js"></script>
    <script src="js/components/footer-loader.js"></script>
    <script src="js/components/chatbot-loader.js"></script>
</body>

</html>
