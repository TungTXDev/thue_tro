<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Kiếm Phòng Trọ - RIPT Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/chatbot.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <div class="search-page">
        <!-- Sidebar Filters -->
        <aside class="search-sidebar">
            <div class="sidebar-header">
                <h3><i class="bi bi-funnel"></i> Bộ lọc tìm kiếm</h3>
                <button class="btn-reset" onclick="resetFilters()">
                    <i class="bi bi-arrow-clockwise"></i> Đặt lại
                </button>
            </div>

            <div class="sidebar-content">
                <!-- Search Input -->
                <div class="filter-section">
                    <label class="filter-label">
                        <i class="bi bi-search"></i> Tìm kiếm
                    </label>
                    <div class="search-autocomplete-wrapper">
                        <input type="text" id="search-input" class="form-control"
                            placeholder="Nhập tên phòng, khu vực..." autocomplete="off"
                            onkeyup="handleSearchInputSidebar(event)" onfocus="showSuggestionsSidebar()"
                            onblur="hideSuggestionsSidebar()">
                        <div id="search-suggestions-sidebar" class="search-suggestions"></div>
                    </div>
                </div>

                <!-- Area Filter -->
                <div class="filter-section">
                    <label class="filter-label">
                        <i class="bi bi-arrows-angle-expand"></i> Lọc theo diện tích
                    </label>
                    <div class="range-values">
                        <span id="area-min-value">0</span> m² - <span id="area-max-value">100</span> m²
                    </div>
                    <div class="range-slider-wrapper">
                        <input type="range" id="area-min" class="range-slider" min="0" max="100" value="0"
                            oninput="updateAreaRange()">
                        <input type="range" id="area-max" class="range-slider" min="0" max="100" value="100"
                            oninput="updateAreaRange()">
                    </div>
                </div>

                <!-- Price Filter -->
                <div class="filter-section">
                    <label class="filter-label">
                        <i class="bi bi-cash-coin"></i> Lọc theo giá
                    </label>
                    <div class="range-values">
                        <span id="price-min-value">0</span>đ - <span id="price-max-value">6,000,000</span>đ
                    </div>
                    <div class="range-slider-wrapper">
                        <input type="range" id="price-min" class="range-slider" min="0" max="6000000" step="100000"
                            value="0" oninput="updatePriceRange()">
                        <input type="range" id="price-max" class="range-slider" min="0" max="6000000" step="100000"
                            value="6000000" oninput="updatePriceRange()">
                    </div>
                </div>

                <!-- Amenities Filter -->
                <div class="filter-section">
                    <label class="filter-label">
                        <i class="bi bi-star"></i> Lọc theo tiện nghi
                    </label>
                    <div class="amenities-checkboxes">
                        <label class="checkbox-label">
                            <input type="checkbox" value="Giường" onchange="applyFilters()">
                            <span>Giường</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="Tủ quần áo" onchange="applyFilters()">
                            <span>Tủ quần áo</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="Bàn làm việc" onchange="applyFilters()">
                            <span>Bàn làm việc</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="Điều hòa" onchange="applyFilters()">
                            <span>Điều hòa</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="Quạt điện" onchange="applyFilters()">
                            <span>Quạt điện</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="Máy giặt" onchange="applyFilters()">
                            <span>Máy giặt</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="Tủ lạnh" onchange="applyFilters()">
                            <span>Tủ lạnh</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="Bếp" onchange="applyFilters()">
                            <span>Bếp</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="WC riêng" onchange="applyFilters()">
                            <span>WC riêng</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="Nóng lạnh" onchange="applyFilters()">
                            <span>Nóng lạnh</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="Wifi" onchange="applyFilters()">
                            <span>Wifi</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="Cửa sổ" onchange="applyFilters()">
                            <span>Cửa sổ</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="Gương" onchange="applyFilters()">
                            <span>Gương</span>
                        </label>
                    </div>
                </div>

                <!-- Sort By -->
                <div class="filter-section">
                    <label class="filter-label">
                        <i class="bi bi-sort-down"></i> Sắp xếp
                    </label>
                    <select id="sort-by" class="form-select" onchange="applyFilters()">
                        <option value="default">Mặc định</option>
                        <option value="price-asc">Giá: Thấp đến cao</option>
                        <option value="price-desc">Giá: Cao đến thấp</option>
                        <option value="area-asc">Diện tích: Nhỏ đến lớn</option>
                        <option value="area-desc">Diện tích: Lớn đến nhỏ</option>
                    </select>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="search-main">
            <div class="search-header">
                <h2 id="results-count">Đang tải...</h2>
                <button class="btn-toggle-sidebar" onclick="toggleSidebar()">
                    <i class="bi bi-funnel"></i> Bộ lọc
                </button>
            </div>

            <div id="room-grid" class="room-grid">
                <!-- Rooms will be loaded here -->
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/core/storage.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/apiClient.js"></script>
    <script src="js/services/authApi.js"></script>
    <script src="js/services/roomApi.js"></script>
    <script src="js/features/auth.js"></script>
    <script src="js/features/chat.js"></script>
    <script src="js/pages/search.js"></script>
    <script src="js/components/header-loader.js"></script>
    <script src="js/components/footer-loader.js"></script>
    <script src="js/components/chatbot-loader.js"></script>
</body>

</html>
