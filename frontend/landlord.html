<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landlord Dashboard - Thuê Phòng Trọ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="dashboard-body">
<div class="dashboard-shell">
    <aside class="dashboard-sidebar landlord-sidebar">
        <a href="index.html" class="dashboard-brand">
            <i class="bi bi-buildings"></i>
            <span>Thuê Phòng</span>
        </a>
        <div class="sidebar-label">Chủ trọ</div>
        <nav class="sidebar-nav">
            <a href="#overview" class="active"><i class="bi bi-speedometer2"></i> Tổng quan</a>
            <a href="#rooms"><i class="bi bi-houses"></i> Phòng của tôi</a>
            <a href="#orders"><i class="bi bi-calendar-check"></i> Lịch đặt xem</a>
            <a href="index.html"><i class="bi bi-house-door"></i> Trang thuê trọ</a>
        </nav>
        <button onclick="logout()" class="btn btn-outline-light w-100 mt-auto">
            <i class="bi bi-box-arrow-right"></i> Đăng xuất
        </button>
    </aside>

    <main class="dashboard-main">
        <div class="dashboard-topbar">
            <div>
                <p class="dashboard-kicker">Landlord dashboard</p>
                <h1>Quản lý phòng trọ</h1>
            </div>
            <div class="dashboard-user">
                <i class="bi bi-person-circle"></i>
                <span id="dashboard-user-name">Chủ trọ</span>
            </div>
        </div>

        <section id="overview" class="dashboard-grid">
            <div class="metric-card">
                <span class="metric-icon"><i class="bi bi-houses"></i></span>
                <p>Phòng đang quản lý</p>
                <div id="landlord-total-rooms" class="stat-val">0</div>
            </div>
            <div class="metric-card">
                <span class="metric-icon"><i class="bi bi-check-circle"></i></span>
                <p>Phòng còn trống</p>
                <div id="landlord-available-rooms" class="stat-val">0</div>
            </div>
            <div class="metric-card">
                <span class="metric-icon"><i class="bi bi-calendar-check"></i></span>
                <p>Đơn liên quan</p>
                <div id="landlord-total-orders" class="stat-val">0</div>
            </div>
        </section>

        <section id="rooms" class="dashboard-panel">
            <div class="panel-header">
                <div>
                    <p class="dashboard-kicker">Rooms</p>
                    <h2>Phòng của tôi</h2>
                </div>
                <button class="btn btn-primary btn-sm" onclick="alert('Tính năng đăng phòng sẽ được bổ sung ở bước tiếp theo.')">
                    <i class="bi bi-plus-circle"></i> Thêm phòng
                </button>
            </div>
            <div id="landlord-room-list" class="landlord-room-list"></div>
        </section>

        <section id="orders" class="dashboard-panel">
            <div class="panel-header">
                <div>
                    <p class="dashboard-kicker">Bookings</p>
                    <h2>Lịch đặt xem phòng</h2>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Ngày đặt</th>
                            <th>Khách hàng</th>
                            <th>Tên phòng</th>
                            <th>Giá thanh toán</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="landlord-order-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/apiClient.js"></script>
<script src="js/services/roomApi.js"></script>
<script src="js/features/auth.js"></script>
<script src="js/pages/landlord.js"></script>
</body>
</html>
